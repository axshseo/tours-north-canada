<!-- Affiliate Product Card Component -->
<!-- Specialized Tailwind component for 'Partner Tours' with trust-building badges -->

<div class="max-w-sm bg-white rounded-2xl shadow-lg overflow-hidden hover:shadow-xl transition-all duration-300 transform hover:scale-105 relative">
    <!-- Best Price Guarantee Sticker -->
    <div class="absolute top-4 right-4 z-10">
        <div class="bg-[#b91c1c] text-white px-3 py-1 rounded-full text-xs font-bold shadow-lg transform rotate-12">
            Best Price Guarantee
        </div>
    </div>

    <!-- Official Partner Badge -->
    <div class="absolute top-4 left-4 z-10">
        <div class="bg-[#064e3b] text-white px-3 py-1 rounded-full text-xs font-bold shadow-lg flex items-center space-x-1">
            <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M6.267 3.455a3.066 3.066 0 001.745-.723 3.066 3.066 0 013.976 0 3.066 3.066 0 001.745.723 3.066 3.066 0 012.812 2.812c.051.643.304 1.254.723 1.745a3.066 3.066 0 010 3.976 3.066 3.066 0 00-.723 1.745 3.066 3.066 0 01-2.812 2.812 3.066 3.066 0 00-1.745.723 3.066 3.066 0 01-3.976 0 3.066 3.066 0 00-1.745-.723 3.066 3.066 0 01-2.812-2.812 3.066 3.066 0 00-.723-1.745 3.066 3.066 0 010-3.976 3.066 3.066 0 00.723-1.745 3.066 3.066 0 012.812-2.812zm7.44 5.252a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path>
            </svg>
            <span>Official Partner</span>
        </div>
    </div>

    <!-- Tour Image -->
    <div class="relative h-48 bg-gradient-to-br from-[#064e3b] to-[#b91c1c] overflow-hidden">
        <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?auto=format&fit=crop&w=400&h=300" alt="Partner Tour" class="w-full h-full object-cover opacity-90">
        <div class="absolute inset-0 bg-black bg-opacity-20"></div>
    </div>

    <!-- Card Content -->
    <div class="p-6">
        <!-- Tour Title -->
        <h3 class="text-xl font-bold text-[#064e3b] mb-2 font-syne">Exclusive Partner Tour</h3>

        <!-- Tour Description -->
        <p class="text-gray-600 text-sm mb-4 leading-relaxed">
            Experience Canada's hidden gems with our trusted partners. Premium tours with local expertise and authentic adventures.
        </p>

        <!-- Tour Details -->
        <div class="flex items-center justify-between mb-4">
            <div class="flex items-center space-x-2">
                <svg class="w-4 h-4 text-[#064e3b]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                <span class="text-sm text-gray-500">4 hours</span>
            </div>
            <div class="flex items-center space-x-2">
                <svg class="w-4 h-4 text-[#064e3b]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
                </svg>
                <span class="text-sm text-gray-500">Pickup included</span>
            </div>
        </div>

        <!-- Price and CTA -->
        <div class="flex items-center justify-between">
            <div>
                <div class="text-2xl font-bold text-[#b91c1c] font-syne">From $89</div>
                <div class="text-xs text-gray-500">per person</div>
            </div>
            <button class="bg-[#b91c1c] hover:bg-red-700 text-white font-bold py-3 px-6 rounded-xl transition-all duration-200 transform hover:scale-105 shadow-lg">
                Book Now
            </button>
        </div>

        <!-- Trust Indicators -->
        <div class="mt-4 pt-4 border-t border-gray-100">
            <div class="flex items-center justify-center space-x-4 text-xs text-gray-500">
                <div class="flex items-center space-x-1">
                    <svg class="w-3 h-3 text-green-500" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"></path>
                    </svg>
                    <span>Verified Reviews</span>
                </div>
                <div class="flex items-center space-x-1">
                    <svg class="w-3 h-3 text-green-500" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"></path>
                    </svg>
                    <span>Secure Booking</span>
                </div>
            </div>
        </div>
    </div>
</div>
