<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toronto Hub — Tours North Canada (2026)</title>
    
    <!-- Design System Baseline -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#064e3b',
                        accent: '#b91c1c',
                        highlight: '#a3e635'
                    },
                    fontFamily: {
                        inter: ['Inter', 'sans-serif'],
                        syne: ['Syne', 'sans-serif']
                    }
                }
            }
        }
    </script>

    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <style>
        [x-cloak] { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Shimmer Effect */
        .shimmer {
            background: linear-gradient(90deg, #f1f5f9 25%, #f8fafc 50%, #f1f5f9 75%);
            background-size: 200% 100%;
            animation: shimmer-animation 1.5s infinite;
        }
        @keyframes shimmer-animation {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(226, 232, 240, 0.5);
        }

        .snap-start { scroll-snap-align: start; }

        /* Neon Moss Glow */
        .neon-glow:hover {
            box-shadow: 0 0 30px rgba(163, 230, 53, 0.4);
            border-color: #a3e635;
        }
        .neon-text-glow {
            text-shadow: 0 0 10px rgba(163, 230, 53, 0.6);
        }
        
        html { scroll-behavior: smooth; }
        
        .masonry {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            grid-auto-rows: 10px;
            gap: 24px;
        }
    </style>
</head>
<body class="bg-[#fcfdfd] font-inter text-slate-900" 
      x-data="torontoHub()" 
      x-init="init()">

    <!-- 1. PRISTINE HERO -->
    <section class="relative h-[50vh] flex items-center justify-center bg-primary overflow-hidden">
        <img src="https://images.unsplash.com/photo-1543783230-278385764042?auto=format&fit=crop&w=1920&q=80" 
             class="absolute inset-0 w-full h-full object-cover opacity-50 mix-blend-overlay" alt="Toronto Skyline">
        <div class="relative z-10 text-center px-6">
            <h1 class="text-6xl md:text-8xl font-black font-syne text-white tracking-tighter mb-4">TORONTO.</h1>
        </div>
    </section>

    <!-- 2. STICKY SUB-NAV -->
    <nav class="sticky top-0 z-50 glass-nav h-20 flex items-center">
        <div class="max-w-7xl mx-auto w-full px-6 flex justify-between items-center">
            <div class="flex gap-8 whitespace-nowrap overflow-x-auto no-scrollbar">
                <a href="#top-10" class="text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-primary transition">Must-See 10</a>
                <a href="#rainy-day" class="text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-primary transition">Rainy Day</a>
                <a href="#urban-explorer" class="text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-primary transition">Urban Explorer</a>
                <a href="#intel" class="text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-primary transition">Intel</a>
            </div>
        </div>
    </nav>

    <!-- 3. TASK 1: THE 'ONLY IN TORONTO' SHELF (Masonry Grid) -->
    <section id="top-10" class="py-24 max-w-7xl mx-auto px-6">
        <h2 class="text-4xl font-black font-syne text-primary tracking-tighter mb-12">ONLY IN TORONTO.</h2>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Skeleton States -->
            <template x-if="loading.top10">
                <template x-for="i in 6">
                    <div class="h-[400px] rounded-[3rem] shimmer"></div>
                </template>
            </template>

            <!-- Live Masonry -->
            <template x-if="!loading.top10">
                <template x-for="(tour, index) in top10" :key="tour.id">
                    <div class="relative group rounded-[3rem] overflow-hidden bg-white shadow-3xl hover:-translate-y-2 transition duration-500 h-[450px] neon-glow border border-transparent">
                        <img :src="tour.image_url" class="absolute inset-0 w-full h-full object-cover group-hover:scale-110 transition duration-1000">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent"></div>
                        
                        <!-- Large Ranking Number -->
                        <span class="absolute top-8 left-8 text-7xl font-black font-syne text-white/20" x-text="String(index + 1).padStart(2, '0')"></span>
                        
                        <!-- Insider Tip Badge -->
                        <div class="absolute top-8 right-8">
                            <span x-show="tour.unique_selling_point" class="bg-highlight text-primary text-[8px] font-black px-3 py-1.5 rounded-full uppercase tracking-widest shadow-xl neon-text-glow" x-text="'Insider Tip: ' + tour.unique_selling_point.substring(0, 60) + '...'"></span>
                            <span x-show="!tour.unique_selling_point" class="bg-primary text-white text-[8px] font-black px-3 py-1.5 rounded-full uppercase tracking-widest shadow-xl">Safety Verified</span>
                        </div>

                        <div class="absolute bottom-8 left-8 right-8 text-white">
                            <h3 class="text-2xl font-black font-syne mb-4" x-text="tour.title"></h3>
                            <div class="flex items-center justify-between">
                                <span class="bg-white/10 backdrop-blur-md px-4 py-2 rounded-xl text-xs font-bold" x-text="'$'+tour.price"></span>
                                <a :href="'/tours/product-template.html?id='+tour.id" class="bg-accent text-white px-8 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-white hover:text-primary transition shadow-2xl">Book Now</a>
                            </div>
                        </div>
                    </div>
                </template>
            </template>
        </div>
    </section>

    <!-- 4. TASK 2: THE 'RAINY DAY SAFE' CAROUSEL -->
    <section id="rainy-day" class="bg-slate-50 py-24">
        <div class="max-w-7xl mx-auto px-6">
            <h2 class="text-4xl font-black font-syne text-primary tracking-tighter mb-12">RAINY DAY SAFE.</h2>
            
            <div class="flex gap-6 overflow-x-auto no-scrollbar snap-x snap-mandatory pb-8">
                <!-- Skeleton Loader -->
                <template x-if="loading.rainy">
                    <template x-for="i in 4">
                        <div class="min-w-[320px] md:min-w-[400px] h-96 rounded-[3rem] shimmer flex-shrink-0"></div>
                    </template>
                </template>

                <!-- Live Carousel -->
                <template x-if="!loading.rainy">
                    <template x-for="tour in rainyShelf" :key="tour.id">
                        <div class="min-w-[320px] md:min-w-[400px] snap-start bg-white rounded-[3rem] p-8 border border-slate-100 shadow-sm hover:shadow-2xl transition duration-500 group flex-shrink-0">
                            <div class="h-48 rounded-3xl overflow-hidden mb-6">
                                <img :src="tour.image_url" class="w-full h-full object-cover group-hover:scale-110 transition duration-700">
                            </div>
                            <h3 class="text-xl font-black font-syne text-primary mb-4" x-text="tour.title"></h3>
                            <div class="flex items-center justify-between">
                                <span class="text-accent font-black text-sm" x-text="'$'+tour.price"></span>
                                <a :href="'/tours/product-template.html?id='+tour.id" class="text-[10px] font-black uppercase text-primary border-b-2 border-primary pb-1">Master Entry →</a>
                            </div>
                        </div>
                    </template>
                </template>
            </div>
        </div>
    </section>

    <!-- 5. TASK 3: THE 'URBAN EXPLORER' COLLECTION (3-Column Grid) -->
    <section id="urban-explorer" class="py-24 max-w-7xl mx-auto px-6">
        <h2 class="text-4xl font-black font-syne text-primary tracking-tighter mb-12">URBAN EXPLORER.</h2>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12">
            <!-- Skeleton Loader -->
            <template x-if="loading.urban">
                <template x-for="i in 3">
                    <div class="h-80 rounded-[4rem] shimmer"></div>
                </template>
            </template>

            <!-- Live Grid -->
            <template x-if="!loading.urban">
                <template x-for="tour in urbanShelf" :key="tour.id">
                    <div class="group">
                        <div class="relative h-64 rounded-[3rem] overflow-hidden mb-6">
                            <img :src="tour.image_url" class="w-full h-full object-cover group-hover:scale-125 transition duration-1000">
                            <div class="absolute top-6 left-6">
                                <span x-show="tour.unique_selling_point" class="bg-white/90 backdrop-blur-md text-primary text-[8px] font-black px-4 py-2 rounded-full uppercase tracking-widest shadow-xl" x-text="'Insider Tip: ' + tour.unique_selling_point.substring(0, 60) + '...'"></span>
                                <span x-show="!tour.unique_selling_point" class="bg-white/90 backdrop-blur-md text-primary text-[8px] font-black px-4 py-2 rounded-full uppercase tracking-widest shadow-xl">Verified Local</span>
                            </div>
                        </div>
                        <h3 class="text-2xl font-black font-syne text-primary mb-2" x-text="tour.title"></h3>
                        <div class="flex items-center justify-between">
                            <span class="text-slate-400 font-bold" x-text="'Direct Rate: $'+tour.price"></span>
                            <a :href="'/tours/product-template.html?id='+tour.id" class="w-12 h-12 rounded-full bg-slate-100 flex items-center justify-center text-primary group-hover:bg-primary group-hover:text-white transition group-hover:rotate-45">
                                <i class="fa-solid fa-arrow-up-right-from-square text-xs"></i>
                            </a>
                        </div>
                    </div>
                </template>
            </template>
        </div>
    </section>

    <!-- 6. TASK 4: INTERACTIVE 'INTEL' (Dynamic Hacks) -->
    <section id="intel" class="py-24 bg-primary text-white">
        <div class="max-w-7xl mx-auto px-6">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-20">
                <div class="lg:col-span-1">
                    <h2 class="text-5xl font-black font-syne tracking-tighter mb-8 italic">TORONTO INTEL.</h2>
                    <p class="text-white/60 text-lg mb-12 leading-relaxed tracking-tight">Real-time heuristics and local secrets decoded for the elite traveler.</p>
                </div>
                
                <div class="lg:col-span-2 space-y-4">
                    <!-- Skeleton Loader -->
                    <template x-if="loading.hacks">
                        <template x-for="i in 3">
                            <div class="h-32 rounded-3xl bg-white/5 shimmer"></div>
                        </template>
                    </template>

                    <!-- Live Hacks Loop -->
                    <template x-if="!loading.hacks">
                        <template x-for="hack in travelHacks" :key="hack.title">
                            <div class="bg-white/5 backdrop-blur-3xl border border-white/10 p-8 rounded-[2rem] hover:bg-white/10 transition group cursor-pointer">
                                <div class="flex items-center gap-6">
                                    <div class="w-12 h-12 bg-highlight rounded-xl flex items-center justify-center text-primary text-xl shadow-2xl">
                                        <i class="fa-solid fa-lightbulb"></i>
                                    </div>
                                    <div class="flex-1">
                                        <h4 class="text-xl font-bold font-syne mb-1" x-text="hack.title"></h4>
                                        <p class="text-white/40 text-sm" x-text="hack.snippet"></p>
                                    </div>
                                    <i class="fa-solid fa-chevron-right text-white/20 group-hover:text-highlight transition"></i>
                                </div>
                            </div>
                        </template>
                    </template>
                </div>
            </div>
        </div>
    </section>

    <!-- 7. FOOTER -->
    <footer class="bg-[#fcfdfd] py-12 border-t border-slate-100">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <p class="text-[10px] font-black uppercase text-slate-300 tracking-[0.3em] font-syne">&copy; 2026 Tours North. Billion-Dollar Tech Standard.</p>
        </div>
    </footer>

    <!-- 8. HYDRATION LOGIC -->
    <script type="module">
        import { 
            getTopRatedTours, 
            getToursByCollection, 
            getLatestTravelHacks,
            getWeatherSafeTours
        } from '../assets/js/tours-north-api.js';

        window.torontoHub = function() {
            return {
                loading: {
                    top10: true,
                    urban: true,
                    rainy: true,
                    hacks: true
                },
                top10: [],
                urbanShelf: [],
                rainyShelf: [],
                travelHacks: [],

                async init() {
                    console.log("[Manager] Initiating Toronto Hydration Sequence...");
                    
                    // Concurrent Data Streams
                    this.loadTop10();
                    this.loadRainyCarousel();
                    this.loadUrbanExplorer();
                    this.loadIntel();
                },

                async loadTop10() {
                    this.top10 = await getTopRatedTours('Toronto', 10);
                    this.loading.top10 = false;
                },

                async loadRainyCarousel() {
                    this.rainyShelf = await getWeatherSafeTours('Toronto', 6);
                    this.loading.rainy = false;
                },

                async loadUrbanExplorer() {
                    this.urbanShelf = await getToursByCollection('Toronto', 'Urban-Explorer', 6);
                    this.loading.urban = false;
                },

                async loadIntel() {
                    this.travelHacks = await getLatestTravelHacks('Toronto', 3);
                    this.loading.hacks = false;
                }
            }
        }
    </script>
</body>
</html>
