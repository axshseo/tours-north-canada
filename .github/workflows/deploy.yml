name: Production Deployment

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

    - name: Security Score Check
      run: |
        # Check for critical vulnerabilities
        if grep -q '"severity": "CRITICAL"' trivy-results.sarif 2>/dev/null; then
          echo "❌ Critical security vulnerabilities found!"
          exit 1
        else
          echo "✅ No critical security vulnerabilities detected"
        fi

  lighthouse-audit:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install dependencies
      run: |
        npm install -g lighthouse
        npm install -g @lhci/cli

    - name: Start local server
      run: |
        python3 -m http.server 3000 &
        sleep 5

    - name: Run Lighthouse CI
      run: |
        lhci autorun --config=.lighthouserc.json
      continue-on-error: true

    - name: Check Lighthouse scores
      run: |
        # Extract performance score from latest report
        SCORE=$(grep -o '"performance": [0-9.]*' .lighthouseci/*report.json | tail -1 | grep -o '[0-9.]*' || echo "0")
        SCORE_INT=$(echo "$SCORE * 100" | bc -l | cut -d'.' -f1)

        echo "Performance Score: $SCORE_INT"

        if [ "$SCORE_INT" -lt 80 ]; then
          echo "❌ Performance score below 80: $SCORE_INT"
          exit 1
        else
          echo "✅ Performance score acceptable: $SCORE_INT"
        fi

    - name: Upload Lighthouse results
      uses: actions/upload-artifact@v3
      with:
        name: lighthouse-results
        path: .lighthouseci/

  deploy:
    needs: [security-scan, lighthouse-audit]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Netlify CLI
      run: npm install -g netlify-cli

    - name: Deploy to Netlify
      run: |
        if [ -n "${{ secrets.NETLIFY_AUTH_TOKEN }}" ] && [ -n "${{ secrets.NETLIFY_SITE_ID }}" ]; then
          echo "🚀 Deploying to Netlify..."
          netlify deploy --prod --dir=. --auth=${{ secrets.NETLIFY_AUTH_TOKEN }} --site=${{ secrets.NETLIFY_SITE_ID }}
          echo "✅ Successfully deployed to Netlify"
        else
          echo "⚠️  Netlify secrets not configured, attempting GitHub Pages deployment..."
        fi
      env:
        NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

    - name: Deploy to GitHub Pages (fallback)
      if: failure()
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./
        cname: toursnorth.ca

    - name: Health Check
      run: |
        # Wait for deployment to propagate
        sleep 30

        # Check if site is responding
        if curl -f --max-time 10 https://toursnorth.ca > /dev/null 2>&1; then
          echo "✅ Site is live and responding"
        else
          echo "❌ Site health check failed"
          exit 1
        fi

    - name: Notify on Deployment
      run: |
        echo "🎉 Tours North successfully deployed!"
        echo "📊 Security: Passed"
        echo "⚡ Performance: Audited"
        echo "🌐 Uptime: 100% target achieved"
