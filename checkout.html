    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Tours North</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Syne:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        h1, h2, h3 { font-family: 'Syne', sans-serif; }
    </style>
</head>
<body class="bg-snow">
    <div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-md w-full space-y-8">
            <!-- Header -->
            <div class="text-center">
                <h1 class="text-3xl font-bold text-[#064e3b]">Complete Your Booking</h1>
                <p class="mt-2 text-sm text-gray-600">Secure checkout powered by Tours North</p>
            </div>

            <!-- Order Summary -->
            <div class="bg-white rounded-2xl shadow-lg p-6">
                <h2 class="text-xl font-semibold text-[#064e3b] mb-4">Order Summary</h2>
                <div class="space-y-3">
                    <div class="flex justify-between">
                        <span class="text-gray-600">Tour:</span>
                        <span class="font-semibold">Niagara Falls Boat Tour</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-gray-600">Date:</span>
                        <span>December 15, 2026</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-gray-600">Guests:</span>
                        <span>2 Adults</span>
                    </div>
                    <div class="border-t pt-3">
                        <div class="flex justify-between text-lg font-bold">
                            <span>Total:</span>
                            <span class="text-[#b91c1c]">$149.00 CAD</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Payment Form -->
            <div class="bg-white rounded-2xl shadow-lg p-6">
                <div class="flex items-center justify-center mb-6">
                    <div class="flex items-center bg-green-50 px-4 py-2 rounded-full">
                        <svg class="w-5 h-5 text-green-600 mr-2" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"></path>
                        </svg>
                        <span class="text-green-700 font-semibold text-sm">Secure Payment</span>
                    </div>
                </div>

                <form class="space-y-6">
                    <!-- Card Number -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Card Number</label>
                        <div class="relative">
                            <input type="text" placeholder="1234 5678 9012 3456" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#064e3b] focus:border-transparent">
                            <div class="absolute right-3 top-3">
                                <svg class="w-6 h-6 text-gray-400" fill="currentColor" viewBox="0 0 20 20">
                                    <path d="M4 4a2 2 0 00-2 2v4a2 2 0 002 2V6h10a2 2 0 00-2-2H4zm2 6a2 2 0 012-2h8a2 2 0 012 2v4a2 2 0 01-2 2H8a2 2 0 01-2-2v-4zm6 4a2 2 0 100-4 2 2 0 000 4z"></path>
                                </svg>
                            </div>
                        </div>
                    </div>

                    <!-- Expiry and CVC -->
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Expiry Date</label>
                            <input type="text" placeholder="MM/YY" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#064e3b] focus:border-transparent">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">CVC</label>
                            <input type="text" placeholder="123" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#064e3b] focus:border-transparent">
                        </div>
                    </div>

                    <!-- Name on Card -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Name on Card</label>
                        <input type="text" placeholder="John Doe" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#064e3b] focus:border-transparent">
                    </div>

                    <!-- Billing Address -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Billing Address</label>
                        <input type="text" placeholder="123 Main St, Toronto, ON" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#064e3b] focus:border-transparent">
                    </div>

                    <!-- Confirm Booking Button -->
                    <button type="submit" class="w-full bg-[#b91c1c] hover:bg-red-700 text-white font-bold py-4 px-4 rounded-xl transition-all duration-200 transform hover:scale-105">
                        Confirm Booking
                    </button>
                </form>

                <!-- Trust Badges -->
                <div class="mt-6 flex justify-center space-x-4">
                    <div class="text-xs text-gray-500">Powered by</div>
                    <div class="flex space-x-2">
                        <span class="px-2 py-1 bg-gray-100 rounded text-xs">SSL</span>
                        <span class="px-2 py-1 bg-gray-100 rounded text-xs">PCI</span>
                        <span class="px-2 py-1 bg-gray-100 rounded text-xs">TICO</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
